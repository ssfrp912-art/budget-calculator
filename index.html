<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бюджет</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>Бюджет</h1>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('calculator')">Калькулятор</button>
        <button class="tab-btn" onclick="switchTab('reports')">Отчёты</button>
        <button class="tab-btn" onclick="switchTab('debts')">Долги</button>
      </div>
    </div>

    <div class="page active" id="page-calculator">
    <div class="dashboard">
      <div class="card">
        <div class="card-label">Доходы</div>
        <div class="card-value income" id="totalIncome">0 ₽</div>
      </div>
      <div class="card">
        <div class="card-label">Расходы</div>
        <div class="card-value expense" id="totalExpense">0 ₽</div>
      </div>
      <div class="card">
        <div class="card-label">Баланс</div>
        <div class="card-value balance" id="balance">0 ₽</div>
      </div>
    </div>

    <div class="main-grid">
      <div class="form-card">
        <div class="form-title">Новая запись</div>

        <div class="type-toggle">
          <button class="type-btn active-expense" id="btnExpense" onclick="setType('expense')">Расход</button>
          <button class="type-btn" id="btnIncome" onclick="setType('income')">Доход</button>
        </div>

        <div class="form-group">
          <label>Описание</label>
          <input type="text" id="desc" placeholder="Например: Продукты">
        </div>

        <div class="form-group">
          <label>Сумма (₽)</label>
          <input type="number" id="amount" placeholder="0" min="0" step="0.01">
        </div>

        <div class="form-group">
          <label>Категория</label>
          <div class="category-row">
            <select id="category"></select>
            <button class="add-cat-btn" onclick="toggleCategoryInput()">+</button>
          </div>
          <div class="category-input-wrap" id="categoryInputWrap">
            <input type="text" id="newCategoryInput" placeholder="Название категории">
            <button class="cat-confirm-btn" onclick="addCategory()">OK</button>
          </div>
        </div>

        <div class="form-group">
          <label>Дата</label>
          <input type="date" id="date">
        </div>

        <button class="add-btn" onclick="addTransaction()">Добавить</button>

        <div class="receipt-divider">
          <button class="add-btn btn-receipt" onclick="document.getElementById('receiptInput').click()">Распознать чек</button>
          <input type="file" id="receiptInput" accept="image/*" capture="environment" onchange="processReceipt(event)">
        </div>

        <div class="receipt-divider">
          <div class="divider-label">Долги</div>
          <button class="add-btn btn-debt" onclick="openDebtModal()">Дать в долг</button>
        </div>
      </div>

      <div class="right-panel">
        <div class="transactions-card">
          <div class="transactions-title">Транзакции</div>
          <div class="transactions-list" id="transactionsList">
            <div class="empty-state">Нет записей. Добавьте первую!</div>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-title">Расходы по категориям</div>
          <div class="chart-bars" id="chartBars">
            <div class="empty-state">Нет данных</div>
          </div>
        </div>
      </div>
    </div>
    </div>

    <div class="page" id="page-reports">
      <div class="card card-reports">
        <div class="reports-controls">
          <select id="reportPeriod" onchange="renderReports()">
            <option value="days">По дням</option>
            <option value="months" selected>По месяцам</option>
            <option value="years">По годам</option>
          </select>
          <input type="month" id="reportMonth" onchange="renderReports()">
          <input type="number" id="reportYear" placeholder="Год" min="2000" max="2099" onchange="renderReports()">
        </div>
        <div class="transactions-list" id="reportContent">
          <div class="empty-state">Нет данных</div>
        </div>
      </div>
    </div>

    <div class="page" id="page-debts">
      <div class="card card-reports">
        <div class="debts-header">
          <div class="debts-title">Долги</div>
          <button class="add-btn btn-debt btn-sm" onclick="openDebtModal()">Дать в долг</button>
        </div>
        <div class="debts-summary">
          <div class="debts-total-label">Всего должны:</div>
          <div class="debts-total-value" id="debtsTotal">0 ₽</div>
        </div>
        <div id="debtsList">
          <div class="empty-state">Нет долгов</div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="ocrModal">
    <div class="modal">
      <div class="modal-title">Распознать чек</div>
      <div class="modal-subtitle" id="ocrStatus">Обработка...</div>

      <img class="ocr-preview" id="ocrPreview">

      <div class="ocr-progress" id="ocrProgress">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">0%</div>
      </div>

      <div id="reviewItems"></div>

      <div class="modal-actions" id="modalActions">
        <button class="btn-cancel" onclick="closeModal()">Отмена</button>
        <button class="btn-confirm" onclick="confirmReceipt()">Добавить</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="debtModal">
    <div class="modal">
      <div class="modal-title">Дать в долг</div>
      <div class="modal-subtitle">Заполните данные должника</div>

      <div class="form-group">
        <label>Имя</label>
        <input type="text" id="debtName" placeholder="Иван Иванов">
      </div>

      <div class="form-group">
        <label>Телефон или номер</label>
        <input type="text" id="debtPhone" placeholder="+7 999 123-45-67">
      </div>

      <div class="form-group">
        <label>Сумма (₽)</label>
        <input type="number" id="debtAmount" placeholder="0" min="0" step="0.01">
      </div>

      <div class="form-group">
        <label>Комментарий</label>
        <input type="text" id="debtComment" placeholder="За что дали в долг">
      </div>

      <div class="form-group">
        <label>Дата</label>
        <input type="date" id="debtDate">
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeDebtModal()">Отмена</button>
        <button class="btn-confirm" onclick="addDebt()">Добавить</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="debtHistoryModal">
    <div class="modal">
      <div class="modal-title" id="debtHistoryTitle">История выплат</div>
      <div class="modal-subtitle" id="debtHistorySubtitle"></div>
      <div id="debtHistoryContent"></div>
      <div class="modal-actions">
        <button class="btn-confirm" onclick="document.getElementById('debtHistoryModal').classList.remove('active')">Закрыть</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    let currentType = 'expense';
    let transactions = JSON.parse(localStorage.getItem('budget_transactions') || '[]');
    let customCategories = JSON.parse(localStorage.getItem('budget_categories') || '{}');
    let debts = JSON.parse(localStorage.getItem('budget_debts') || '[]');

    document.getElementById('date').valueAsDate = new Date();
    document.getElementById('debtDate').valueAsDate = new Date();

    function getDefaultCats(type) {
      return type === 'expense'
        ? ['Еда', 'Транспорт', 'Жильё', 'Развлечения', 'Здоровье', 'Одежда', 'Долги', 'Другое']
        : ['Зарплата', 'Фриланс', 'Инвестиции', 'Другое'];
    }

    function getAllCats(type) {
      const defaults = getDefaultCats(type);
      const custom = customCategories[type] || [];
      return [...defaults, ...custom];
    }

    function populateCategories() {
      const select = document.getElementById('category');
      select.innerHTML = '';
      getAllCats(currentType).forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        select.appendChild(opt);
      });
    }

    function setType(type) {
      currentType = type;
      const btnE = document.getElementById('btnExpense');
      const btnI = document.getElementById('btnIncome');
      btnE.className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
      btnI.className = 'type-btn' + (type === 'income' ? ' active-income' : '');
      populateCategories();
      hideCategoryInput();
    }

    function toggleCategoryInput() {
      const wrap = document.getElementById('categoryInputWrap');
      wrap.classList.toggle('visible');
      if (wrap.classList.contains('visible')) {
        document.getElementById('newCategoryInput').focus();
      }
    }

    function hideCategoryInput() {
      document.getElementById('categoryInputWrap').classList.remove('visible');
      document.getElementById('newCategoryInput').value = '';
    }

    function addCategory() {
      const input = document.getElementById('newCategoryInput');
      const name = input.value.trim();
      if (!name) return;

      const allCats = getAllCats(currentType);
      if (allCats.includes(name)) return;

      if (!customCategories[currentType]) customCategories[currentType] = [];
      customCategories[currentType].push(name);
      localStorage.setItem('budget_categories', JSON.stringify(customCategories));

      populateCategories();
      document.getElementById('category').value = name;
      hideCategoryInput();
    }

    document.getElementById('newCategoryInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addCategory();
    });

    function switchTab(tab) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + tab).classList.add('active');
      if (event && event.target) event.target.classList.add('active');
      if (tab === 'reports') renderReports();
      if (tab === 'debts') renderDebts();
    }

    function renderReports() {
      const period = document.getElementById('reportPeriod').value;
      const container = document.getElementById('reportContent');
      const now = new Date();
      const defaultYear = now.getFullYear();
      const defaultMonth = String(now.getMonth() + 1).padStart(2, '0');

      if (!document.getElementById('reportYear').value) document.getElementById('reportYear').value = defaultYear;
      if (!document.getElementById('reportMonth').value) document.getElementById('reportMonth').value = `${defaultYear}-${defaultMonth}`;

      const selectedYear = parseInt(document.getElementById('reportYear').value);
      const selectedMonth = document.getElementById('reportMonth').value;

      let filtered = [...transactions];

      if (period === 'years') {
        filtered = filtered.filter(t => {
          const y = new Date(t.date).getFullYear();
          return y === selectedYear;
        });
      } else if (period === 'months') {
        filtered = filtered.filter(t => t.date && t.date.startsWith(selectedMonth));
      }

      const grouped = {};
      filtered.forEach(t => {
        let key;
        if (period === 'days') key = t.date;
        else if (period === 'months') key = t.date ? t.date.slice(0, 7) : '';
        else key = t.date ? new Date(t.date).getFullYear().toString() : '';

        if (!grouped[key]) grouped[key] = { income: 0, expense: 0 };
        if (t.type === 'income') grouped[key].income += t.amount;
        else grouped[key].expense += t.amount;
      });

      const keys = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

      if (keys.length === 0) {
        container.innerHTML = '<div class="empty-state">Нет данных за выбранный период</div>';
        return;
      }

      let totalInc = 0, totalExp = 0;
      let rows = '';
      keys.forEach(k => {
        const d = grouped[k];
        const bal = d.income - d.expense;
        totalInc += d.income;
        totalExp += d.expense;

        let label;
        if (period === 'days') {
          label = new Date(k + 'T00:00:00').toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        } else if (period === 'months') {
          const [y, m] = k.split('-');
          label = new Date(y, m - 1).toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
        } else {
          label = k;
        }

        const balClass = bal >= 0 ? 'stat-balance-pos' : 'stat-balance-neg';
        rows += `<tr>
          <td>${label}</td>
          <td class="stat-income">${formatMoney(d.income)}</td>
          <td class="stat-expense">${formatMoney(d.expense)}</td>
          <td class="${balClass}">${bal >= 0 ? '+' : ''}${formatMoney(bal)}</td>
        </tr>`;
      });

      const totalBal = totalInc - totalExp;
      const totalBalClass = totalBal >= 0 ? 'stat-balance-pos' : 'stat-balance-neg';
      const avgIncome = totalInc / keys.length;
      const avgExpense = totalExp / keys.length;

      container.innerHTML = `
        <table class="stat-table">
          <thead>
            <tr>
              <th>Период</th>
              <th>Доходы</th>
              <th>Расходы</th>
              <th>Баланс</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr class="stat-total">
              <td>Итого</td>
              <td class="stat-income">${formatMoney(totalInc)}</td>
              <td class="stat-expense">${formatMoney(totalExp)}</td>
              <td class="${totalBalClass}">${totalBal >= 0 ? '+' : ''}${formatMoney(totalBal)}</td>
            </tr>
          </tbody>
        </table>
        <div class="stat-summary">
          <span>Средний доход: <b class="clr-income">${formatMoney(avgIncome)}</b></span>
          <span>Средний расход: <b class="clr-expense">${formatMoney(avgExpense)}</b></span>
          <span>Периодов: <b>${keys.length}</b></span>
        </div>
      `;
    }

    function formatMoney(n) {
      return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', minimumFractionDigits: 0 }).format(n);
    }

    function addTransaction() {
      const desc = document.getElementById('desc').value.trim();
      const amount = parseFloat(document.getElementById('amount').value);
      const category = document.getElementById('category').value;
      const date = document.getElementById('date').value;

      if (!desc || !amount || amount <= 0) return;

      transactions.unshift({ id: Date.now(), type: currentType, desc, amount, category, date });
      save();
      render();

      document.getElementById('desc').value = '';
      document.getElementById('amount').value = '';
    }

    function deleteTransaction(id) {
      transactions = transactions.filter(t => t.id !== id);
      save();
      render();
    }

    function save() {
      localStorage.setItem('budget_transactions', JSON.stringify(transactions));
    }

    function saveDebts() {
      localStorage.setItem('budget_debts', JSON.stringify(debts));
    }

    function render() {
      let income = 0, expense = 0;
      transactions.forEach(t => {
        if (t.type === 'income') income += t.amount;
        else expense += t.amount;
      });

      document.getElementById('totalIncome').textContent = formatMoney(income);
      document.getElementById('totalExpense').textContent = formatMoney(expense);
      document.getElementById('balance').textContent = formatMoney(income - expense);

      const list = document.getElementById('transactionsList');
      if (transactions.length === 0) {
        list.innerHTML = '<div class="empty-state">Нет записей. Добавьте первую!</div>';
      } else {
        list.innerHTML = transactions.map(t => `
          <div class="transaction-item">
            <div class="transaction-info">
              <div class="transaction-desc">${t.desc}</div>
              <div class="transaction-meta">${t.category} · ${new Date(t.date).toLocaleDateString('ru-RU')}</div>
            </div>
            <div class="transaction-amount ${t.type}">${t.type === 'income' ? '+' : '−'}${formatMoney(t.amount)}</div>
            <button class="delete-btn" onclick="deleteTransaction(${t.id})">✕</button>
          </div>
        `).join('');
      }

      const expensesByCategory = {};
      transactions.filter(t => t.type === 'expense').forEach(t => {
        expensesByCategory[t.category] = (expensesByCategory[t.category] || 0) + t.amount;
      });

      const chart = document.getElementById('chartBars');
      const cats = Object.entries(expensesByCategory).sort((a, b) => b[1] - a[1]);
      if (cats.length === 0) {
        chart.innerHTML = '<div class="empty-state">Нет данных</div>';
      } else {
        const max = cats[0][1];
        const colors = ['#c42b1c', '#ca5026', '#e6a101', '#0f7b3f', '#005fb4', '#5b52cd', '#8764b8'];
        chart.innerHTML = cats.map(([cat, val], i) => `
          <div class="chart-bar-row">
            <div class="chart-bar-label">${cat}</div>
            <div class="chart-bar-track">
              <div class="chart-bar-fill" style="width: ${(val / max) * 100}%; background: ${colors[i % colors.length]};"></div>
            </div>
            <div class="chart-bar-value">${formatMoney(val)}</div>
          </div>
        `).join('');
      }
    }

    function renderDebts() {
      const container = document.getElementById('debtsList');
      const activeDebts = debts.filter(d => d.remaining > 0);

      let totalRemaining = 0;
      activeDebts.forEach(d => totalRemaining += d.remaining);
      document.getElementById('debtsTotal').textContent = formatMoney(totalRemaining);

      if (activeDebts.length === 0) {
        container.innerHTML = '<div class="empty-state">Нет долгов</div>';
        return;
      }

      container.innerHTML = activeDebts.map(d => {
        const paidPercent = ((d.amount - d.remaining) / d.amount) * 100;
        return `
          <div class="debt-card">
            <div class="debt-header">
              <div class="debt-person">
                <div class="debt-name">${d.name}</div>
                <div class="debt-contact">${d.phone || 'Нет телефона'}</div>
              </div>
              <div class="debt-amount">${formatMoney(d.remaining)}</div>
            </div>
            ${d.comment ? `<div class="debt-comment">${d.comment}</div>` : ''}
            <div class="debt-progress">
              <div class="debt-progress-bar">
                <div class="debt-progress-fill" style="width: ${paidPercent}%"></div>
              </div>
              <div class="debt-progress-text">${paidPercent.toFixed(0)}% выплачено</div>
            </div>
            <div class="debt-actions">
              <button class="btn-pay" onclick="repayDebt('${d.id}')">Выплатил</button>
              <button class="btn-history" onclick="showDebtHistory('${d.id}')">История</button>
              <button class="btn-delete-debt" onclick="deleteDebt('${d.id}')">Удалить</button>
            </div>
            <div class="debt-date">Создан: ${new Date(d.date).toLocaleDateString('ru-RU')}</div>
          </div>
        `;
      }).join('');
    }

    function openDebtModal() {
      document.getElementById('debtName').value = '';
      document.getElementById('debtPhone').value = '';
      document.getElementById('debtAmount').value = '';
      document.getElementById('debtComment').value = '';
      document.getElementById('debtDate').valueAsDate = new Date();
      document.getElementById('debtModal').classList.add('active');
    }

    function closeDebtModal() {
      document.getElementById('debtModal').classList.remove('active');
    }

    function addDebt() {
      const name = document.getElementById('debtName').value.trim();
      const phone = document.getElementById('debtPhone').value.trim();
      const amount = parseFloat(document.getElementById('debtAmount').value);
      const comment = document.getElementById('debtComment').value.trim();
      const date = document.getElementById('debtDate').value;

      if (!name || !amount || amount <= 0) return;

      debts.push({
        id: Date.now().toString(),
        name,
        phone,
        amount,
        remaining: amount,
        comment,
        date,
        payments: []
      });

      saveDebts();
      renderDebts();
      closeDebtModal();
    }

    function repayDebt(id) {
      const debt = debts.find(d => d.id === id);
      if (!debt || debt.remaining <= 0) return;

      const amountStr = prompt(`Сумма выплаты (остаток: ${formatMoney(debt.remaining)})`, debt.remaining);
      if (!amountStr) return;

      const amount = parseFloat(amountStr);
      if (!amount || amount <= 0) return;

      const actualAmount = Math.min(amount, debt.remaining);

      debt.remaining -= actualAmount;
      debt.payments.push({
        id: Date.now(),
        amount: actualAmount,
        date: new Date().toISOString().split('T')[0]
      });

      transactions.unshift({
        id: Date.now(),
        type: 'income',
        desc: `Возврат долга от ${debt.name}`,
        amount: actualAmount,
        category: 'Долги',
        date: new Date().toISOString().split('T')[0]
      });

      saveDebts();
      save();
      render();
      renderDebts();
    }

    function deleteDebt(id) {
      if (!confirm('Удалить этот долг?')) return;
      debts = debts.filter(d => d.id !== id);
      saveDebts();
      renderDebts();
    }

    function showDebtHistory(id) {
      const debt = debts.find(d => d.id === id);
      if (!debt) return;

      document.getElementById('debtHistoryTitle').textContent = debt.name;
      document.getElementById('debtHistorySubtitle').textContent = `Всего: ${formatMoney(debt.amount)} · Остаток: ${formatMoney(debt.remaining)}`;

      const container = document.getElementById('debtHistoryContent');
      if (debt.payments.length === 0) {
        container.innerHTML = '<div class="empty-state">Выплат ещё не было</div>';
      } else {
        container.innerHTML = `
          <table class="stat-table">
            <thead>
              <tr>
                <th>Дата</th>
                <th>Сумма</th>
              </tr>
            </thead>
            <tbody>
              ${debt.payments.map(p => `
                <tr>
                  <td>${new Date(p.date).toLocaleDateString('ru-RU')}</td>
                  <td class="stat-income">+${formatMoney(p.amount)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      document.getElementById('debtHistoryModal').classList.add('active');
    }

    let ocrExtracted = [];

    async function processReceipt(event) {
      const file = event.target.files[0];
      if (!file) return;

      const modal = document.getElementById('ocrModal');
      const preview = document.getElementById('ocrPreview');
      const progress = document.getElementById('ocrProgress');
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');
      const status = document.getElementById('ocrStatus');
      const review = document.getElementById('reviewItems');
      const actions = document.getElementById('modalActions');

      modal.classList.add('active');
      preview.style.display = 'none';
      progress.style.display = 'block';
      review.innerHTML = '';
      actions.style.display = 'none';
      status.textContent = 'Загрузка изображения...';
      progressFill.style.width = '0%';
      progressText.textContent = '0%';

      preview.style.display = 'block';
      preview.src = URL.createObjectURL(file);

      try {
        const result = await Tesseract.recognize(file, 'rus+eng', {
          logger: m => {
            if (m.status === 'recognizing text') {
              const pct = Math.round(m.progress * 100);
              progressFill.style.width = pct + '%';
              progressText.textContent = pct + '%';
              status.textContent = 'Распознавание текста...';
            } else {
              status.textContent = m.status || 'Обработка...';
            }
          }
        });

        const text = result.data.text;
        ocrExtracted = parseReceipt(text);

        if (ocrExtracted.length === 0) {
          status.textContent = 'Не удалось найти суммы. Добавьте вручную.';
          ocrExtracted = [{ desc: '', amount: '', category: 'Еда' }];
        }

        progress.style.display = 'none';
        status.textContent = `Найдено позиций: ${ocrExtracted.length}`;
        renderReviewItems();
        actions.style.display = 'flex';
      } catch (err) {
        status.textContent = 'Ошибка распознавания. Попробуйте ещё раз.';
        progress.style.display = 'none';
        console.error(err);
      }

      event.target.value = '';
    }

    function parseReceipt(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l);
      const items = [];
      const amountRegex = /(\d+[\s.,]?\d{2})/g;

      for (const line of lines) {
        const matches = [...line.matchAll(amountRegex)];
        if (matches.length > 0) {
          const amountStr = matches[matches.length - 1][0].replace(/[\s]/g, '').replace(',', '.');
          const amount = parseFloat(amountStr);

          if (amount > 0 && amount < 1000000) {
            const desc = line.replace(amountRegex, '').replace(/[₽руб.\s]+$/g, '').trim();
            items.push({ desc: desc || 'Без описания', amount: amount, category: 'Еда' });
          }
        }
      }

      if (items.length === 0) {
        const allAmounts = [...text.matchAll(amountRegex)];
        for (const match of allAmounts) {
          const amountStr = match[0].replace(/[\s]/g, '').replace(',', '.');
          const amount = parseFloat(amountStr);
          if (amount > 0 && amount < 1000000) {
            items.push({ desc: 'Позиция из чека', amount: amount, category: 'Еда' });
          }
        }
      }

      return items;
    }

    function renderReviewItems() {
      const container = document.getElementById('reviewItems');
      container.innerHTML = ocrExtracted.map((item, i) => `
        <div class="review-item">
          <div class="review-item-header">
            <div class="review-amount">${item.amount} ₽</div>
            <button class="review-remove" onclick="removeReviewItem(${i})">✕</button>
          </div>
          <div class="review-item-row">
            <input type="text" value="${item.desc}" placeholder="Описание" onchange="ocrExtracted[${i}].desc = this.value">
          </div>
          <div class="review-item-row">
            <select onchange="ocrExtracted[${i}].category = this.value">
              ${getAllCats('expense').map(c => `<option value="${c}" ${c === item.category ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
          </div>
        </div>
      `).join('');
    }

    function removeReviewItem(index) {
      ocrExtracted.splice(index, 1);
      renderReviewItems();
    }

    function closeModal() {
      document.getElementById('ocrModal').classList.remove('active');
      ocrExtracted = [];
    }

    function confirmReceipt() {
      const date = document.getElementById('date').value || new Date().toISOString().split('T')[0];

      for (const item of ocrExtracted) {
        if (item.amount && item.amount > 0) {
          transactions.unshift({
            id: Date.now() + Math.random(),
            type: 'expense',
            desc: item.desc || 'Расход из чека',
            amount: parseFloat(item.amount),
            category: item.category || 'Еда',
            date: date
          });
        }
      }

      save();
      render();
      closeModal();
    }

    populateCategories();
    render();
  </script>
</body>
</html>
